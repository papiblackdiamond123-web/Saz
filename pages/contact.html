<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<header class="site-header">
  <div class="container header-inner">
    <a href="../index.html" class="logo"><span class="logo-icon">▶</span><span class="logo-text">World<em>Stream</em></span></a>
    <nav class="main-nav" id="mainNav">
      <a href="../index.html" class="nav-link">Home</a>
      <a href="tv.html" class="nav-link">Live TV</a>
      <a href="radio.html" class="nav-link">Live Radio</a>
      <a href="countries.html" class="nav-link">Countries</a>
    </nav>
    <div class="header-actions"><button class="hamburger" id="hamburger"><span></span><span></span><span></span></button></div>
  </div>
</header>

<section class="page-hero">
  <div class="container">
    <h1>Contact Us</h1>
    <p>We'd love to hear from you.</p>
  </div>
</section>

<section class="section">
  <div class="container" style="max-width:600px;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;">
      <h2 style="font-family:var(--font-display);font-size:24px;letter-spacing:1px;margin-bottom:24px;">Send a Message</h2>
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div>
          <label style="font-size:13px;color:var(--text3);display:block;margin-bottom:6px;">Your Name</label>
          <input type="text" placeholder="John Doe" style="width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:15px;padding:10px 16px;outline:none;" />
        </div>
        <div>
          <label style="font-size:13px;color:var(--text3);display:block;margin-bottom:6px;">Email Address</label>
          <input type="email" placeholder="you@example.com" style="width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:15px;padding:10px 16px;outline:none;" />
        </div>
        <div>
          <label style="font-size:13px;color:var(--text3);display:block;margin-bottom:6px;">Subject</label>
          <select style="width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:15px;padding:10px 16px;outline:none;">
            <option>General Inquiry</option>
            <option>Report Broken Stream</option>
            <option>Advertise with Us</option>
            <option>DMCA / Copyright</option>
            <option>Other</option>
          </select>
        </div>
        <div>
          <label style="font-size:13px;color:var(--text3);display:block;margin-bottom:6px;">Message</label>
          <textarea rows="5" placeholder="Your message…" style="width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:15px;padding:10px 16px;outline:none;resize:vertical;"></textarea>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="alert('Message sent! We\'ll respond within 24–48 hours.')">Send Message</button>
      </div>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-brand"><a href="../index.html" class="logo"><span class="logo-icon">▶</span><span class="logo-text">World<em>Stream</em></span></a></div>
    <div class="footer-links">
      <div class="footer-col"><h4>Legal</h4><a href="privacy.html">Privacy</a><a href="terms.html">Terms</a><a href="dmca.html">DMCA</a></div>
    </div>
  </div>
  <div class="footer-bottom container"><p>© 2025 WorldStream. All rights reserved.</p></div>
</footer>
<script src="../js/data.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
